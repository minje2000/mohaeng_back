name: Deploy Spring Boot WAR to EC2 (Tomcat)

on:
  push:
    branches: ["main"]

  repository_dispatch:
    types: [frontend-updated]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # backend repo checkout
      - name: Checkout Backend
        uses: actions/checkout@v4

      # React repo clone
      - name: Clone React Repository
        run: |
          git clone -b main https://github.com/ghwj12/mohaeng_front.git frontend

      # Node 설치
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # React node_modules cache (배포 속도 향상)
      - name: Cache React node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # React dependency 설치
      - name: Install React dependencies
        working-directory: ./frontend
        run: npm install

      # React build
      - name: Build React
        working-directory: ./frontend
        run: CI=false npm run build
        env:
          REACT_APP_API_BASE_URL: ${{ secrets.REACT_APP_API_BASE_URL }}

      # 기존 static 삭제
      - name: Clean static folder
        run: rm -rf src/main/resources/static/*

      # React build → Spring static 복사
      - name: Copy React build to Spring static
        run: |
          mkdir -p src/main/resources/static
          cp -r frontend/build/* src/main/resources/static/

      # JDK 설치
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Gradle cache
      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # WAR build
      - name: Build WAR
        run: |
          chmod +x gradlew
          ./gradlew clean bootWar

      # WAR EC2 전송
      - name: Copy WAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "build/libs/*.war"
          target: "/home/${{ secrets.EC2_USER }}/deploy"

      # EC2 Tomcat 배포
      - name: Deploy on EC2 (Tomcat)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            echo "==> Find war"
            ls -al /home/${{ secrets.EC2_USER }}/deploy

            WAR_FILE=$(ls -1 /home/${{ secrets.EC2_USER }}/deploy/build/libs/*.war | tail -n 1)
            echo "WAR_FILE=$WAR_FILE"

            echo "==> Stop tomcat"
            sudo systemctl stop tomcat9

            echo "==> Clean old app"
            sudo rm -rf /var/lib/tomcat9/webapps/ROOT
            sudo rm -f /var/lib/tomcat9/webapps/ROOT.war

            echo "==> Copy new war"
            sudo cp "$WAR_FILE" /var/lib/tomcat9/webapps/ROOT.war
            sudo chown tomcat:tomcat /var/lib/tomcat9/webapps/ROOT.war

            echo "==> Start tomcat"
            sudo systemctl start tomcat9

            echo "==> Tail logs"
            sleep 3
            sudo tail -n 80 /var/log/tomcat9/catalina.out || true
