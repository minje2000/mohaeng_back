name: Deploy Spring Boot WAR to EC2 (Tomcat)

on:
  push:
    branches: ["main"]   # main 브랜치 push 시 배포

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # React 빌드 추가
      - name: Build React
        run: |
          cd frontend            # React 프로젝트 경로
          npm ci
          npm run build
          # React 빌드를 Spring Boot static 폴더로 복사
          cp -r build/* ../src/main/resources/static/

      - name: Build WAR
        run: |
          chmod +x gradlew
          ./gradlew clean bootWar

      # WAR 파일 EC2로 전송
      - name: Copy WAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "build/libs/*.war"
          target: "/home/${{ secrets.EC2_USER }}/deploy"

      # EC2에서 Tomcat 배포
      - name: Deploy on EC2 (Tomcat)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            echo "==> Find war"
            ls -al /home/${{ secrets.EC2_USER }}/deploy

            WAR_FILE=$(ls -1 /home/${{ secrets.EC2_USER }}/deploy/build/libs/*.war | tail -n 1)
            echo "WAR_FILE=$WAR_FILE"

            echo "==> Stop tomcat"
            sudo systemctl stop tomcat9

            echo "==> Clean old app"
            sudo rm -rf /var/lib/tomcat9/webapps/ROOT
            sudo rm -f /var/lib/tomcat9/webapps/ROOT.war

            echo "==> Copy new war"
            sudo cp "$WAR_FILE" /var/lib/tomcat9/webapps/ROOT.war
            sudo chown tomcat:tomcat /var/lib/tomcat9/webapps/ROOT.war

            echo "==> Start tomcat"
            sudo systemctl start tomcat9

            echo "==> Tail logs"
            sleep 3
            sudo tail -n 80 /var/log/tomcat9/catalina.out || true
