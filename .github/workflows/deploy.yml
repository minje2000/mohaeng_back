name: spring deploy

# main 브랜치 push 시 실행
on:
  push:
    branches: [ main ]

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

    # repository 코드 checkout
    - name: Checkout repository
      uses: actions/checkout@v3

    # AWS 인증 설정
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # ECR 로그인
    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v1

    # Spring Docker 이미지 빌드
    - name: Build Docker image
      run: |
        docker build -t mohaeng-spring .

    # ECR push용 태그 설정
    - name: Tag Docker image
      run: |
        docker tag mohaeng-spring:latest \
        ${{ secrets.ECR_REGISTRY }}/mohaeng-spring:latest

    # ECR push
    - name: Push Docker image
      run: |
        docker push \
        ${{ secrets.ECR_REGISTRY }}/mohaeng-spring:latest

    # EC2 서버에 접속해서 배포
    - name: Deploy to EC2 (Blue-Green)
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |

          set -e

          cd deploy

          # ECR 로그인
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
          | docker login \
          --username AWS \
          --password-stdin \
          ${{ secrets.ECR_REGISTRY }}

          # 현재 실행중인 버전 확인
          CURRENT=$(cat /home/ec2-user/current_color)

          if [ "$CURRENT" = "blue" ]; then
            NEW="green"
            NEW_PORT=8082
            OLD_CONTAINER="spring-blue"
            NEW_CONTAINER="spring-green"
          else
            NEW="blue"
            NEW_PORT=8081
            OLD_CONTAINER="spring-green"
            NEW_CONTAINER="spring-blue"
          fi

          echo "Current: $CURRENT → Deploying: $NEW"

          # 최신 이미지 pull
          docker pull ${{ secrets.ECR_REGISTRY }}/mohaeng-spring:latest

          # 기존 새 컨테이너 제거
          docker rm -f $NEW_CONTAINER || true

          # 새 컨테이너 실행
          docker run -d \
            -p $NEW_PORT:8080 \
            --name $NEW_CONTAINER \
            ${{ secrets.ECR_REGISTRY }}/mohaeng-spring:latest

          echo "Health Check..."

          # Health Check (최대 5번 시도)
          for i in {1..5}
          do
            sleep 5
            if curl -f http://localhost:$NEW_PORT/actuator/health; then
              echo "Health check success"
              break
            fi

            if [ $i -eq 5 ]; then
              echo "Health check failed"
              docker logs $NEW_CONTAINER
              exit 1
            fi
          done

          # nginx가 바라보는 서버 변경
          echo "set \$service_url http://127.0.0.1:$NEW_PORT;" \
          | sudo tee /etc/nginx/conf.d/service-url.inc

          # nginx reload (무중단)
          sudo nginx -s reload

          # 이전 컨테이너 종료
          docker stop $OLD_CONTAINER || true
          docker rm $OLD_CONTAINER || true

          # 현재 상태 저장
          echo $NEW > /home/ec2-user/current_color

          echo "Deploy success!"
